<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ Sticker Booth ✨</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;700;900&display=swap');

:root {
–yellow: #FFE83D;
–pink: #FF6B9D;
–cyan: #00D4FF;
–purple: #B24BF3;
–orange: #FF8C42;
–dark: #1A0A2E;
–card: #2D1B4E;
–light: #F0E6FF;
}

- { box-sizing: border-box; margin: 0; padding: 0; }

body {
font-family: ‘Nunito’, sans-serif;
background: var(–dark);
color: var(–light);
min-height: 100vh;
overflow-x: hidden;
background-image:
radial-gradient(circle at 20% 20%, rgba(178,75,243,0.15) 0%, transparent 50%),
radial-gradient(circle at 80% 80%, rgba(0,212,255,0.1) 0%, transparent 50%),
radial-gradient(circle at 50% 50%, rgba(255,107,157,0.05) 0%, transparent 70%);
}

/* Floating background dots */
body::before {
content: ‘’;
position: fixed;
inset: 0;
background-image:
radial-gradient(circle, rgba(255,232,61,0.3) 1px, transparent 1px),
radial-gradient(circle, rgba(255,107,157,0.2) 1px, transparent 1px);
background-size: 60px 60px, 90px 90px;
background-position: 0 0, 30px 30px;
pointer-events: none;
z-index: 0;
}

header {
text-align: center;
padding: 28px 20px 16px;
position: relative;
z-index: 1;
}

header h1 {
font-family: ‘Boogaloo’, cursive;
font-size: clamp(2.2rem, 6vw, 3.8rem);
background: linear-gradient(135deg, var(–yellow), var(–pink), var(–cyan));
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
letter-spacing: 2px;
text-shadow: none;
filter: drop-shadow(0 2px 12px rgba(255,107,157,0.4));
}

header p {
color: rgba(240,230,255,0.6);
font-size: 0.95rem;
margin-top: 4px;
font-weight: 700;
letter-spacing: 3px;
text-transform: uppercase;
}

.app {
max-width: 1100px;
margin: 0 auto;
padding: 0 16px 40px;
position: relative;
z-index: 1;
}

/* STEP 1: Camera */
#step-camera {
display: flex;
flex-direction: column;
align-items: center;
gap: 20px;
padding: 30px 0;
}

.camera-frame {
position: relative;
border-radius: 24px;
overflow: hidden;
border: 3px solid var(–purple);
box-shadow: 0 0 40px rgba(178,75,243,0.5), inset 0 0 20px rgba(0,0,0,0.3);
background: #0d0820;
width: 100%;
max-width: 520px;
aspect-ratio: 4/3;
display: flex;
align-items: center;
justify-content: center;
}

#video {
width: 100%;
height: 100%;
object-fit: cover;
border-radius: 20px;
transform: scaleX(-1);
display: block;
}

.corner {
position: absolute;
width: 28px; height: 28px;
border-color: var(–yellow);
border-style: solid;
z-index: 2;
}
.corner.tl { top: 10px; left: 10px; border-width: 3px 0 0 3px; border-radius: 6px 0 0 0; }
.corner.tr { top: 10px; right: 10px; border-width: 3px 3px 0 0; border-radius: 0 6px 0 0; }
.corner.bl { bottom: 10px; left: 10px; border-width: 0 0 3px 3px; border-radius: 0 0 0 6px; }
.corner.br { bottom: 10px; right: 10px; border-width: 0 3px 3px 0; border-radius: 0 0 6px 0; }

.camera-placeholder {
display: flex;
flex-direction: column;
align-items: center;
gap: 12px;
color: rgba(240,230,255,0.4);
}
.camera-placeholder .icon { font-size: 4rem; }
.camera-placeholder span { font-size: 0.9rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }

.btn-row {
display: flex;
gap: 14px;
flex-wrap: wrap;
justify-content: center;
}

.btn {
font-family: ‘Boogaloo’, cursive;
font-size: 1.1rem;
letter-spacing: 1px;
padding: 12px 28px;
border: none;
border-radius: 50px;
cursor: pointer;
transition: transform 0.15s, box-shadow 0.15s;
position: relative;
overflow: hidden;
}
.btn:active { transform: scale(0.95); }
.btn:hover { transform: translateY(-2px); }

.btn-primary {
background: linear-gradient(135deg, var(–pink), var(–purple));
color: white;
box-shadow: 0 4px 20px rgba(255,107,157,0.5);
}
.btn-secondary {
background: linear-gradient(135deg, var(–cyan), #0077ff);
color: white;
box-shadow: 0 4px 20px rgba(0,212,255,0.4);
}
.btn-yellow {
background: linear-gradient(135deg, var(–yellow), var(–orange));
color: var(–dark);
box-shadow: 0 4px 20px rgba(255,232,61,0.4);
font-weight: 900;
}
.btn-green {
background: linear-gradient(135deg, #4ade80, #22c55e);
color: var(–dark);
box-shadow: 0 4px 20px rgba(74,222,128,0.4);
font-weight: 900;
}

input[type=file] { display: none; }

/* STEP 2: Editor — fills viewport, no scroll */
#step-editor {
display: none;
position: fixed;
inset: 0;
z-index: 10;
background: var(–dark);
background-image:
radial-gradient(circle at 20% 20%, rgba(178,75,243,0.15) 0%, transparent 50%),
radial-gradient(circle at 80% 80%, rgba(0,212,255,0.1) 0%, transparent 50%);
}

/* ── PORTRAIT (tall): stickers top, canvas middle, controls bottom ── */
.editor-layout {
width: 100%;
height: 100%;
display: grid;
grid-template-rows: auto auto 1fr auto;
grid-template-columns: 1fr;
grid-template-areas:
“strip”
“canvas”
“controls”;
gap: 8px;
padding: 8px;
}

/* ── LANDSCAPE: stickers right column, rest left ── */
@media (orientation: landscape) {
.editor-layout {
grid-template-rows: auto 1fr auto;
grid-template-columns: 1fr 72px;
grid-template-areas:
“canvas  strip”
“controls strip”;
gap: 8px;
}
}

/* Sticker strip — portrait: horizontal row on top */
.sticker-strip-wrap {
grid-area: strip;
background: var(–card);
border-radius: 14px;
border: 2px solid rgba(178,75,243,0.4);
padding: 8px 10px;
display: flex;
align-items: center;
gap: 8px;
min-width: 0;
overflow: hidden;
}

/* Portrait: horizontal scroll */
.sticker-strip {
display: flex;
flex-direction: row;
gap: 6px;
overflow-x: auto;
overflow-y: hidden;
padding-bottom: 2px;
scrollbar-width: thin;
scrollbar-color: var(–purple) transparent;
flex: 1;
}
.sticker-strip::-webkit-scrollbar { height: 3px; }
.sticker-strip::-webkit-scrollbar-track { background: transparent; }
.sticker-strip::-webkit-scrollbar-thumb { background: var(–purple); border-radius: 10px; }

/* Landscape: vertical scroll rail */
@media (orientation: landscape) {
.sticker-strip-wrap {
flex-direction: column;
padding: 8px 6px;
border-radius: 14px;
align-self: stretch;
height: 100%;
}
.sticker-strip {
flex-direction: column;
overflow-x: hidden;
overflow-y: auto;
padding-bottom: 0;
padding-right: 2px;
}
.sticker-strip::-webkit-scrollbar { width: 3px; height: auto; }
}

.strip-emoji-label {
font-size: 1rem;
flex-shrink: 0;
}

/* Canvas */
.canvas-col {
grid-area: canvas;
min-height: 0;
min-width: 0;
display: flex;
align-items: center;
justify-content: center;
}

.canvas-wrap {
position: relative;
border-radius: 16px;
overflow: hidden;
border: 3px solid var(–pink);
box-shadow: 0 0 30px rgba(255,107,157,0.3);
background: #000;
cursor: default;
touch-action: none;
user-select: none;
/* Size to fit available space while keeping aspect ratio */
max-width: 100%;
max-height: 100%;
}
.canvas-wrap.placing { cursor: crosshair; }

#main-canvas {
display: block;
/* Let canvas fill its natural size; JS will constrain via CSS */
max-width: 100%;
max-height: 100%;
border-radius: 12px;
}

/* Controls bar */
.controls-bar {
grid-area: controls;
display: flex;
align-items: center;
gap: 8px;
background: var(–card);
border-radius: 14px;
padding: 8px 12px;
border: 2px solid rgba(178,75,243,0.3);
min-width: 0;
flex-wrap: nowrap;
}
.controls-bar label {
font-size: 0.7rem;
font-weight: 900;
text-transform: uppercase;
letter-spacing: 1px;
color: rgba(240,230,255,0.6);
white-space: nowrap;
flex-shrink: 0;
}
.controls-bar input[type=range] { flex: 1; min-width: 40px; }

.sticker-btn {
background: rgba(255,255,255,0.06);
border: 2px solid transparent;
border-radius: 10px;
padding: 3px;
font-size: 1.5rem;
cursor: pointer;
transition: all 0.15s;
width: 46px;
height: 46px;
flex-shrink: 0;
display: flex;
align-items: center;
justify-content: center;
line-height: 1;
}
.sticker-btn:hover {
background: rgba(255,232,61,0.15);
border-color: var(–yellow);
transform: scale(1.12);
}
.sticker-btn.active {
background: rgba(255,107,157,0.25);
border-color: var(–pink);
transform: scale(1.08);
}

body.editing header,
body.editing .app > #step-camera { display: none !important; }
flex: 1;
accent-color: var(–pink);
cursor: pointer;
}

.hint {
font-size: 0.72rem;
color: rgba(240,230,255,0.4);
text-align: center;
margin-top: 8px;
font-weight: 700;
letter-spacing: 1px;
text-transform: uppercase;
}

/* Placed stickers overlay */
.sticker-overlay {
position: absolute;
inset: 0;
pointer-events: none;
}

.placed-sticker {
position: absolute;
cursor: move;
pointer-events: all;
user-select: none;
touch-action: none;
transform-origin: center center;
line-height: 1;
display: flex;
align-items: center;
justify-content: center;
transition: filter 0.1s;
}
.placed-sticker:hover { filter: drop-shadow(0 0 6px rgba(255,232,61,0.8)); }
.placed-sticker.selected {
filter: drop-shadow(0 0 8px rgba(0,212,255,1));
outline: 2px dashed var(–cyan);
outline-offset: 3px;
border-radius: 6px;
}

.delete-handle {
position: absolute;
top: -12px;
right: -12px;
width: 22px; height: 22px;
background: var(–pink);
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
font-size: 0.7rem;
cursor: pointer;
z-index: 10;
color: white;
font-weight: 900;
border: 2px solid white;
line-height: 1;
}
.resize-handle {
position: absolute;
bottom: -10px;
right: -10px;
width: 20px; height: 20px;
background: var(–cyan);
border-radius: 50%;
cursor: se-resize;
z-index: 10;
border: 2px solid white;
}
.rotate-handle {
position: absolute;
top: -32px;
left: 50%;
transform: translateX(-50%);
width: 20px; height: 20px;
background: var(–yellow);
border-radius: 50%;
cursor: grab;
z-index: 10;
border: 2px solid white;
display: flex; align-items: center; justify-content: center;
font-size: 0.7rem;
}

/* Flash effect */
.flash {
position: fixed;
inset: 0;
background: white;
z-index: 999;
pointer-events: none;
opacity: 0;
animation: flash 0.4s ease-out;
}
@keyframes flash {
0% { opacity: 1; }
100% { opacity: 0; }
}

/* Toast */
.toast {
position: fixed;
bottom: 30px;
left: 50%;
transform: translateX(-50%) translateY(80px);
background: linear-gradient(135deg, var(–purple), var(–pink));
color: white;
padding: 12px 28px;
border-radius: 50px;
font-family: ‘Boogaloo’, cursive;
font-size: 1.1rem;
letter-spacing: 1px;
box-shadow: 0 8px 30px rgba(178,75,243,0.5);
z-index: 9999;
transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* Responsive canvas wrapper */
.canvas-container {
position: relative;
}

#undo-btn { opacity: 0.5; }
#undo-btn:not([disabled]) { opacity: 1; }
</style>

</head>

<script>
// ─── STICKER DATA ────────────────────────────────────────────────────────────
const STICKERS = {
  glasses: ['🕶️','👓','🥽','🤓','😎','👁️','👀','🧿'],
  face: ['👃','🍪','💋','😛','🤪','😜','🫦','🥴'],
  mustache: ['🥸','🧔','🧔‍♀️','👨','🎭','🤡','👺','🎪'],
  hats: ['🎩','👒','🪖','⛑️','👑','🎓','🧢','🪄'],
  fun: ['⭐','💥','❤️','🔥','✨','🌈','🎈','💀','🤖','👽','🦄','🎯']
};

// ─── STATE ───────────────────────────────────────────────────────────────────
let photoLoaded = false;
let selectedSticker = null;
let activeEmoji = null; // null = no sticker selected, must tap panel first
let stickerSize = 80;
let stickers = []; // {el, emoji, x, y, size, rot}
let history = [];

// ─── ELEMENTS ───────────────────────────────────────────────────────────────
const video = document.getElementById('video');
const snapBtn = document.getElementById('snap-btn');
const uploadInput = document.getElementById('upload-input');
const stepCamera = document.getElementById('step-camera');
const stepEditor = document.getElementById('step-editor');
const mainCanvas = document.getElementById('main-canvas');
const ctx = mainCanvas.getContext('2d');
const stickerOverlay = document.getElementById('sticker-overlay');
const canvasWrap = document.getElementById('canvas-wrap');
const sizeSlider = document.getElementById('size-slider');
const saveBtn = document.getElementById('save-btn');
const retakeBtn = document.getElementById('retake-btn');
const undoBtn = document.getElementById('undo-btn');

// ─── CAMERA SETUP ────────────────────────────────────────────────────────────
const camPlaceholder = document.getElementById('cam-placeholder');

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({video: {facingMode:'user'}, audio:false});
    video.srcObject = stream;
    video.style.display = 'block';
    camPlaceholder.style.display = 'none';
  } catch(e) {
    camPlaceholder.innerHTML = '<div class="icon">🚫</div><span>Camera unavailable – use Upload</span>';
  }
}
startCamera();

// ─── BUILD STICKER GRIDS ─────────────────────────────────────────────────────
// ─── BUILD STICKER STRIP ─────────────────────────────────────────────────────
const ALL_STICKERS = [
  ...STICKERS.glasses, ...STICKERS.face, ...STICKERS.mustache,
  ...STICKERS.hats, ...STICKERS.fun
];

const strip = document.getElementById('sticker-strip');
ALL_STICKERS.forEach(em => {
  const btn = document.createElement('button');
  btn.className = 'sticker-btn';
  btn.textContent = em;
  btn.title = em;
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sticker-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeEmoji = em;
    deselectAll();
    updateBadge();
  });
  strip.appendChild(btn);
});

// Badge refs removed — no badge UI
function updateBadge() {
  canvasWrap.classList.toggle('placing', !!activeEmoji);
}

document.getElementById('cancel-sticker-btn') && document.getElementById('cancel-sticker-btn').addEventListener('click', () => clearActiveStickerSelection());

// ─── SIZE SLIDER ─────────────────────────────────────────────────────────────
sizeSlider.addEventListener('input', () => {
  stickerSize = parseInt(sizeSlider.value);
  if (selectedSticker) {
    selectedSticker.size = stickerSize;
    applyTransform(selectedSticker);
  }
});

// ─── SNAP PHOTO ──────────────────────────────────────────────────────────────
snapBtn.addEventListener('click', () => {
  if (!video.srcObject) return;
  flashEffect();
  const w = video.videoWidth || 640;
  const h = video.videoHeight || 480;
  mainCanvas.width = w;
  mainCanvas.height = h;
  ctx.save();
  ctx.translate(w, 0);
  ctx.scale(-1, 1);
  ctx.drawImage(video, 0, 0, w, h);
  ctx.restore();
  showEditor();
});

// ─── UPLOAD PHOTO ────────────────────────────────────────────────────────────
uploadInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      mainCanvas.width = img.width;
      mainCanvas.height = img.height;
      ctx.drawImage(img, 0, 0);
      showEditor();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

function showEditor() {
  if (video.srcObject) {
    video.srcObject.getTracks().forEach(t => t.stop());
    video.srcObject = null;
  }
  stepCamera.style.display = 'none';
  stepEditor.style.display = 'block';
  document.body.classList.add('editing');
  stickers = [];
  history = [];
  stickerOverlay.innerHTML = '';
  undoBtn.disabled = true;
  photoLoaded = true;
  requestAnimationFrame(() => setTimeout(fitCanvas, 50));
  showToast('📸 Looking fabulous!');
}

// Fit canvas to available space in canvas-col
function fitCanvas() {
  const col = document.querySelector('.canvas-col');
  if (!col || !mainCanvas.width) return;
  const availW = col.clientWidth;
  const availH = col.clientHeight;
  const aspect = mainCanvas.width / mainCanvas.height;
  let w = availW;
  let h = w / aspect;
  if (h > availH) { h = availH; w = h * aspect; }
  mainCanvas.style.width = w + 'px';
  mainCanvas.style.height = h + 'px';
  canvasWrap.style.width = w + 'px';
  canvasWrap.style.height = h + 'px';
}

window.addEventListener('resize', fitCanvas);
window.addEventListener('orientationchange', () => setTimeout(fitCanvas, 100));

// ─── PLACE STICKER ON CANVAS CLICK ───────────────────────────────────────────
canvasWrap.addEventListener('click', e => {
  if (!photoLoaded) return;
  // Clicking directly on canvas/overlay (not on a placed sticker) → deselect or place
  if (e.target === mainCanvas || e.target === stickerOverlay) {
    if (activeEmoji) {
      const rect = canvasWrap.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      pushHistory();
      placeSticker(activeEmoji, x, y, stickerSize);
      clearActiveStickerSelection();
    } else {
      deselectAll(); // tapped empty space, deselect any selected sticker
    }
  }
});

function clearActiveStickerSelection() {
  activeEmoji = null;
  document.querySelectorAll('.sticker-btn').forEach(b => b.classList.remove('active'));
  updateBadge();
}

function placeSticker(emoji, x, y, size, rot = 0) {
  const el = document.createElement('div');
  el.className = 'placed-sticker';
  el.textContent = emoji;

  const stk = { el, emoji, x, y, size, rot };
  stickers.push(stk);
  stickerOverlay.appendChild(el);

  applyTransform(stk);
  attachStickerEvents(stk);
  selectSticker(stk);

  return stk;
}

function applyTransform(stk) {
  stk.el.style.fontSize = stk.size + 'px';
  stk.el.style.width = (stk.size * 1.2) + 'px';
  stk.el.style.height = (stk.size * 1.2) + 'px';
  stk.el.style.left = (stk.x - stk.size * 0.6) + 'px';
  stk.el.style.top = (stk.y - stk.size * 0.6) + 'px';
  stk.el.style.transform = `rotate(${stk.rot}rad)`;
}

// ─── STICKER INTERACTION ─────────────────────────────────────────────────────
function attachStickerEvents(stk) {
  const el = stk.el;

  el.addEventListener('pointerdown', e => {
    e.stopPropagation();
    selectSticker(stk);
  });

  // Drag
  let dragging = false, startX, startY, origX, origY;
  el.addEventListener('pointerdown', e => {
    if (e.target.classList.contains('delete-handle') ||
        e.target.classList.contains('resize-handle') ||
        e.target.classList.contains('rotate-handle')) return;
    dragging = true;
    startX = e.clientX; startY = e.clientY;
    origX = stk.x; origY = stk.y;
    el.setPointerCapture(e.pointerId);
    e.preventDefault();
  });
  el.addEventListener('pointermove', e => {
    if (!dragging) return;
    stk.x = origX + (e.clientX - startX);
    stk.y = origY + (e.clientY - startY);
    applyTransform(stk);
  });
  el.addEventListener('pointerup', e => { dragging = false; });
}

function addHandles(stk) {
  // remove existing
  stk.el.querySelectorAll('.delete-handle,.resize-handle,.rotate-handle').forEach(h => h.remove());

  // Delete
  const del = document.createElement('div');
  del.className = 'delete-handle';
  del.textContent = '✕';
  del.addEventListener('pointerdown', e => { e.stopPropagation(); pushHistory(); removeSticker(stk); });
  stk.el.appendChild(del);

  // Resize
  const res = document.createElement('div');
  res.className = 'resize-handle';
  let resizing = false, resStartX, resStartY, resOrigSize;
  res.addEventListener('pointerdown', e => {
    e.stopPropagation();
    resizing = true;
    resStartX = e.clientX; resStartY = e.clientY;
    resOrigSize = stk.size;
    res.setPointerCapture(e.pointerId);
  });
  res.addEventListener('pointermove', e => {
    if (!resizing) return;
    const d = Math.hypot(e.clientX - resStartX, e.clientY - resStartY);
    const sign = (e.clientX - resStartX) + (e.clientY - resStartY) > 0 ? 1 : -1;
    stk.size = Math.max(20, Math.min(250, resOrigSize + sign * d * 0.5));
    sizeSlider.value = stk.size;
    applyTransform(stk);
  });
  res.addEventListener('pointerup', () => { resizing = false; });
  stk.el.appendChild(res);

  // Rotate
  const rot = document.createElement('div');
  rot.className = 'rotate-handle';
  rot.textContent = '↻';
  let rotating = false, rotStartAngle;
  rot.addEventListener('pointerdown', e => {
    e.stopPropagation();
    rotating = true;
    const rect = stk.el.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    rotStartAngle = Math.atan2(e.clientY - cy, e.clientX - cx) - stk.rot;
    rot.setPointerCapture(e.pointerId);
  });
  rot.addEventListener('pointermove', e => {
    if (!rotating) return;
    const rect = stk.el.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    stk.rot = Math.atan2(e.clientY - cy, e.clientX - cx) - rotStartAngle;
    applyTransform(stk);
  });
  rot.addEventListener('pointerup', () => { rotating = false; });
  stk.el.appendChild(rot);
}

function selectSticker(stk) {
  deselectAll();
  selectedSticker = stk;
  stk.el.classList.add('selected');
  addHandles(stk);
  sizeSlider.value = stk.size;
  stickerSize = stk.size;
}

function deselectAll() {
  if (selectedSticker) {
    selectedSticker.el.classList.remove('selected');
    selectedSticker.el.querySelectorAll('.delete-handle,.resize-handle,.rotate-handle').forEach(h => h.remove());
    selectedSticker = null;
  }
}

function removeSticker(stk) {
  stk.el.remove();
  stickers = stickers.filter(s => s !== stk);
  if (selectedSticker === stk) selectedSticker = null;
}

// Click outside deselects
document.addEventListener('pointerdown', e => {
  if (!canvasWrap.contains(e.target) && !document.getElementById('sticker-strip').contains(e.target)) {
    deselectAll();
  }
});

// ─── HISTORY ─────────────────────────────────────────────────────────────────
function pushHistory() {
  history.push(stickers.map(s => ({emoji: s.emoji, x: s.x, y: s.y, size: s.size, rot: s.rot})));
  undoBtn.disabled = false;
}

undoBtn.addEventListener('click', () => {
  if (history.length === 0) return;
  const prev = history.pop();
  // Clear
  stickers.forEach(s => s.el.remove());
  stickers = [];
  stickerOverlay.innerHTML = '';
  selectedSticker = null;
  // Restore
  prev.forEach(s => placeSticker(s.emoji, s.x, s.y, s.size, s.rot));
  deselectAll();
  if (history.length === 0) undoBtn.disabled = true;
});

// ─── RETAKE ──────────────────────────────────────────────────────────────────
retakeBtn.addEventListener('click', () => {
  stickers.forEach(s => s.el.remove());
  stickers = []; history = []; selectedSticker = null;
  stickerOverlay.innerHTML = '';
  stepEditor.style.display = 'none';
  stepCamera.style.display = 'flex';
  document.body.classList.remove('editing');
  photoLoaded = false;
  uploadInput.value = '';
  startCamera();
});

// ─── SAVE IMAGE ──────────────────────────────────────────────────────────────
saveBtn.addEventListener('click', () => {
  deselectAll();

  const cw = mainCanvas.width;   // full resolution width
  const ch = mainCanvas.height;  // full resolution height

  // Get the display size BEFORE drawing (deselectAll doesn't affect this)
  const rect = canvasWrap.getBoundingClientRect();
  const displayW = rect.width;
  const displayH = rect.height;
  const scaleX = cw / displayW;
  const scaleY = ch / displayH;

  const offscreen = document.createElement('canvas');
  offscreen.width = cw;
  offscreen.height = ch;
  const octx = offscreen.getContext('2d');

  // Draw the photo
  octx.drawImage(mainCanvas, 0, 0);

  // Draw each sticker scaled to full resolution
  stickers.forEach(stk => {
    const px = stk.x * scaleX;
    const py = stk.y * scaleY;
    const fontSize = stk.size * scaleX;
    octx.save();
    octx.translate(px, py);
    octx.rotate(stk.rot);
    octx.font = `${fontSize}px serif`;
    octx.textAlign = 'center';
    octx.textBaseline = 'middle';
    octx.fillText(stk.emoji, 0, 0);
    octx.restore();
  });

  // Trigger download via dataURL (works on all browsers including mobile Safari)
  const dataURL = offscreen.toDataURL('image/png');
  const a = document.createElement('a');
  a.href = dataURL;
  a.download = 'sticker-booth-' + Date.now() + '.png';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  showToast('💾 Saved!');
});

// ─── EFFECTS ─────────────────────────────────────────────────────────────────
function flashEffect() {
  const f = document.getElementById('flash');
  f.style.animation = 'none';
  f.offsetHeight;
  f.style.animation = 'flash 0.4s ease-out';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
</script>
